<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blocked" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c2233"/>
    </linearGradient>
    <linearGradient id="proxy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b1a30"/>
      <stop offset="100%" stop-color="#3a1020"/>
    </linearGradient>
    <linearGradient id="upstream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="380" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Security Guardian — MCP Middleware Architecture</text>

  <!-- AI Agent Box -->
  <rect x="60" y="100" width="180" height="160" rx="10" fill="url(#agent)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="bold">🤖 AI Coding Agent</text>
  <text x="150" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">Claude Code / Cline / Cursor</text>
  <line x1="80" y1="165" x2="220" y2="165" stroke="#334155" stroke-width="0.5"/>
  <text x="150" y="185" text-anchor="middle" fill="#e2e8f0" font-size="10">write_file("config.py")</text>
  <text x="150" y="200" text-anchor="middle" fill="#e2e8f0" font-size="10">edit_file("app.js")</text>
  <text x="150" y="215" text-anchor="middle" fill="#e2e8f0" font-size="10">create_file(".env")</text>
  <text x="150" y="235" text-anchor="middle" fill="#64748b" font-size="9">↓ writes to MCP servers ↓</text>

  <!-- Arrow from Agent to Proxy -->
  <line x1="240" y1="180" x2="305" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="170" fill="#64748b" font-size="8">write requests</text>

  <!-- MCP Middleware Box -->
  <rect x="310" y="70" width="180" height="220" rx="10" fill="url(#proxy)" stroke="#fb7185" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="100" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="bold">🛡️ MCP Middleware</text>
  <text x="400" y="115" text-anchor="middle" fill="#fb7185" font-size="9">(transparent proxy)</text>
  <line x1="330" y1="125" x2="470" y2="125" stroke="#5b1a30" stroke-width="0.5"/>

  <!-- Scan Engine -->
  <rect x="330" y="135" width="140" height="28" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="153" text-anchor="middle" fill="#fda4af" font-size="9">🔍 65+ security rules</text>

  <!-- Policy Engine -->
  <rect x="330" y="170" width="140" height="28" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="188" text-anchor="middle" fill="#fda4af" font-size="9">⚖️ Policy: normal / strict</text>

  <!-- Audit Log -->
  <rect x="330" y="205" width="140" height="28" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="223" text-anchor="middle" fill="#fda4af" font-size="9">📋 JSONL audit logging</text>

  <!-- Decision line -->
  <text x="400" y="255" text-anchor="middle" fill="#fb7185" font-size="9">─── decision ───</text>

  <!-- Blocked arrow (down-left) -->
  <line x1="350" y1="265" x2="240" y2="310" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-blocked)"/>
  <rect x="240" y="295" width="100" height="22" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="290" y="310" text-anchor="middle" fill="#fca5a5" font-size="9">🚫 BLOCKED + FIX</text>

  <!-- Allowed arrow (right) -->
  <line x1="490" y1="155" x2="555" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="145" fill="#22c55e" font-size="8">safe → forward</text>

  <!-- Upstream MCP Server Box -->
  <rect x="560" y="100" width="180" height="110" rx="10" fill="url(#upstream)" stroke="#34d399" stroke-width="1.5"/>
  <text x="650" y="130" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">📁 Upstream MCP</text>
  <text x="650" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">filesystem / github / etc.</text>
  <line x1="580" y1="160" x2="720" y2="160" stroke="#065f46" stroke-width="0.5"/>
  <text x="650" y="180" text-anchor="middle" fill="#e2e8f0" font-size="10">Write to disk → ✅</text>
  <text x="650" y="195" text-anchor="middle" fill="#64748b" font-size="9">(only safe writes reach here)</text>

  <!-- Info card at bottom -->
  <rect x="60" y="330" width="680" height="35" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="350" fill="#94a3b8" font-size="10">⚡</text>
  <text x="95" y="350" fill="#e2e8f0" font-size="10">No data leaves your machine · Zero latency for safe writes · 100% Python standard library</text>

  <!-- Legend -->
  <circle cx="80" y="300" r="4" fill="#22d3ee"/>
  <text x="90" y="304" fill="#94a3b8" font-size="9">AI Agent</text>
  <circle cx="160" y="300" r="4" fill="#fb7185"/>
  <text x="170" y="304" fill="#94a3b8" font-size="9">Middleware</text>
  <circle cx="250" y="300" r="4" fill="#34d399"/>
  <text x="260" y="304" fill="#94a3b8" font-size="9">Upstream</text>
</svg>
